<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>在路上 The Journey — 所有連結</title>
<meta name="description" content="Ryan 和 Johnny 邀請企業家與 Wellness 專家，聊聊如何在追求夢想的同時維持身心最好的狀態。收聽 Podcast、看影片、追蹤我們。">
<meta name="theme-color" content="#10243f">
<meta property="og:title" content="在路上 The Journey">
<meta property="og:description" content="在追求夢想的同時，維持身心最好的狀態。一頁找到所有收聽與追蹤連結。">
<meta property="og:image" content="https://ryan234r32.github.io/the-journey-podcast/assets/cover.jpg">
<style>
  :root{ --ink:#10243f; --muted:#7b8794; --shadow:0 6px 18px rgba(16,36,63,.08); }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    min-height:100vh;
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Helvetica Neue",Arial,sans-serif;
    color:var(--ink); -webkit-font-smoothing:antialiased;
    background:linear-gradient(180deg,#dbe7f5 0%,#eaf0f6 32%,#f6f4ef 100%);
    background-attachment:fixed;
  }
  .wrap{ max-width:480px; margin:0 auto; padding:40px 20px 56px; }
  .profile{ text-align:center; margin-bottom:24px; }
  .avatar{
    width:108px; height:108px; border-radius:50%; object-fit:cover;
    border:4px solid #fff; box-shadow:var(--shadow); margin-bottom:14px;
  }
  h1{ font-size:25px; letter-spacing:.5px; margin-bottom:4px; }
  .handle{ color:var(--muted); font-size:14px; margin-bottom:12px; }
  .bio{ font-size:14.5px; color:#3c4a5a; line-height:1.6; max-width:360px; margin:0 auto; }

  .section{ font-size:12px; letter-spacing:2px; color:var(--muted);
    text-transform:uppercase; margin:26px 4px 12px; font-weight:600; }

  .btn{
    display:flex; align-items:center; gap:14px;
    background:#fff; border-radius:16px; padding:11px 16px 11px 11px;
    margin-bottom:12px; text-decoration:none; color:var(--ink);
    box-shadow:var(--shadow); font-weight:600; font-size:16px;
    transition:transform .15s, box-shadow .15s;
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 10px 24px rgba(16,36,63,.14); }
  .tile{
    width:44px; height:44px; border-radius:12px; flex:0 0 44px;
    display:flex; align-items:center; justify-content:center;
  }
  .tile img{ width:23px; height:23px; display:block; }
  .tile.txt{ color:#fff; font-weight:800; font-size:18px; letter-spacing:-1px; font-family:Arial,sans-serif; }
  .name{ flex:1; }
  .go{ color:#c0c8d2; font-size:20px; }
  .btn.soon{ opacity:.5; pointer-events:none; }
  .btn.soon .go{ font-size:12px; color:var(--muted); }

  .foot{ text-align:center; margin-top:30px; font-size:13px; color:var(--muted); }
  .foot a{ color:var(--muted); border-bottom:1px dashed #c7d0db; text-decoration:none; }
  .foot p{ margin-top:10px; }
</style>
</head>
<body>
  <main class="wrap">
    <div class="profile">
      <img class="avatar" src="assets/cover.jpg" alt="在路上 The Journey">
      <h1>在路上 The Journey</h1>
      <p class="handle">Johnny and Ryan</p>
      <p class="bio">在追求夢想的同時，維持身心最好的狀態 🌿<br>企業家 × Wellness 專家的真實對話。</p>
    </div>

    <a class="btn" href="https://www.youtube.com/@TheJourney_JnR" target="_blank" rel="noopener">
      <span class="tile" style="background:#FF0000"><img src="icons/youtube.svg" alt="YouTube"></span>
      <span class="name">YouTube　看影片版訪談</span><span class="go">›</span>
    </a>
    <a class="btn" href="https://www.instagram.com/thejourney.1212/" target="_blank" rel="noopener">
      <span class="tile" style="background:linear-gradient(135deg,#FEDA75,#FA7E1E,#D62976,#962FBF,#4F5BD5)"><img src="icons/instagram.svg" alt="Instagram"></span>
      <span class="name">Instagram</span><span class="go">›</span>
    </a>
    <a class="btn soon">
      <span class="tile" style="background:#1877F2"><img src="icons/facebook.svg" alt="Facebook"></span>
      <span class="name">Facebook</span><span class="go">提供連結後啟用</span>
    </a>

    <div class="section">收聽 Podcast（選你愛用的平台）</div>
    <a class="btn" href="https://podcasts.apple.com/podcast/id1896864602" target="_blank" rel="noopener">
      <span class="tile" style="background:linear-gradient(135deg,#822CBE,#D24DB7)"><img src="icons/applepodcasts.svg" alt="Apple Podcasts"></span>
      <span class="name">Apple Podcasts</span><span class="go">›</span>
    </a>
    <a class="btn" href="https://open.spotify.com/show/2svpqwglrQARrTQ5k6fcH7" target="_blank" rel="noopener">
      <span class="tile" style="background:#1DB954"><img src="icons/spotify.svg" alt="Spotify"></span>
      <span class="name">Spotify</span><span class="go">›</span>
    </a>
    <a class="btn" href="https://podcast.kkbox.com/tw/channel/OoIRdBxuZRSyP2yUvB" target="_blank" rel="noopener">
      <span class="tile txt" style="background:#00AEEF">KK</span>
      <span class="name">KKBOX</span><span class="go">›</span>
    </a>
    <a class="btn" href="https://music.youtube.com/playlist?list=PLmfOOiSp8GwreJ1C7M2Lfgj569zukkrwK" target="_blank" rel="noopener">
      <span class="tile" style="background:#FF0000"><img src="icons/youtubemusic.svg" alt="YouTube Music"></span>
      <span class="name">YouTube Music</span><span class="go">›</span>
    </a>

    <div class="section">合作 & 來賓邀約</div>
    <a class="btn" href="mailto:johnnyandryan.podcast@gmail.com">
      <span class="tile" style="background:#5B6B7D">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="22" height="22" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 7.5l8.5 6 8.5-6"/></svg>
      </span>
      <span class="name">寫信給我們</span><span class="go">›</span>
    </a>

    <div class="foot">
      用其他 App 收聽？<a href="feed.xml">複製 RSS 連結</a>
      <p>© 2026 在路上 The Journey</p>
    </div>
  </main>
</body>
</html>
