<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>在路上 The Journey — 所有連結</title>
<meta name="description" content="和走在人煙稀少道路上的人，聊夢想、身心與生死。收聽 Podcast、看影片、追蹤我們。">
<meta name="theme-color" content="#f3f6fb">
<meta property="og:title" content="在路上 The Journey">
<meta property="og:description" content="和走在人煙稀少道路上的人，聊夢想、身心與生死。一頁找到所有收聽與追蹤連結。">
<meta property="og:image" content="https://the-journey-jnr.vercel.app/assets/cover.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1c2a3e; --muted:#8a93a3; --shadow:0 4px 16px rgba(28,42,62,.07); }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    min-height:100vh; color:var(--ink);
    font-family:"Noto Sans TC",-apple-system,"PingFang TC","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    /* 淺色遮罩(保文字清楚) → 背景圖(有就用) → 清爽亮色 fallback */
    background:
      linear-gradient(180deg, rgba(255,255,255,.55) 0%, rgba(255,255,255,.78) 100%),
      url('assets/bg.jpg') center/cover no-repeat,
      linear-gradient(170deg,#eef4fc 0%,#f4f7fb 45%,#faf6f0 100%);
    background-attachment:fixed;
  }
  .wrap{ max-width:480px; margin:0 auto; padding:48px 22px 60px; }
  .profile{ text-align:center; margin-bottom:26px; }
  .avatar{
    width:112px; height:112px; border-radius:50%; object-fit:cover;
    border:4px solid #fff; box-shadow:0 6px 22px rgba(28,42,62,.13); margin-bottom:15px;
  }
  h1{ font-size:26px; font-weight:900; letter-spacing:1px; margin-bottom:5px; }
  .handle{ color:var(--muted); font-size:14px; font-weight:500; margin-bottom:13px; }
  .bio{ font-size:14.5px; font-weight:400; color:#46536a; line-height:1.7; max-width:360px; margin:0 auto; }

  .section{ font-size:11.5px; letter-spacing:3px; color:var(--muted);
    text-transform:uppercase; margin:26px 6px 13px; font-weight:700; }

  .btn{
    display:flex; align-items:center; gap:14px;
    background:#fff; border:1px solid rgba(28,42,62,.06);
    border-radius:17px; padding:10px 16px 10px 10px; margin-bottom:12px;
    text-decoration:none; color:var(--ink); box-shadow:var(--shadow);
    font-weight:700; font-size:16px; transition:transform .16s, box-shadow .16s;
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 10px 26px rgba(28,42,62,.13); }
  .tile{
    width:46px; height:46px; border-radius:13px; flex:0 0 46px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.16);
  }
  .tile img{ width:24px; height:24px; display:block; }
  .tile.txt{ color:#fff; font-weight:900; font-size:18px; letter-spacing:-1px; font-family:Arial,sans-serif; }
  .name{ flex:1; }
  .go{ color:#cdd4de; font-size:20px; }
  .sub{ display:block; font-weight:400; font-size:12px; color:var(--muted); margin-top:2px; }
  .btn.soon{ opacity:.5; pointer-events:none; }
  .btn.soon .go{ font-size:12px; font-weight:500; color:var(--muted); }

  .foot{ text-align:center; margin-top:32px; font-size:13px; color:var(--muted); }
</style>
</head>
<body>
  <main class="wrap">
    <div class="profile">
      <img class="avatar" src="assets/cover.jpg" alt="在路上 The Journey">
      <h1>在路上 The Journey</h1>
      <p class="handle">Johnny and Ryan</p>
      <p class="bio">和走在人煙稀少道路上的人，聊夢想、身心與生死 🌿<br>沒有標準答案，只有真實的探索。</p>
    </div>

    <div class="section">看影片 & 追蹤我們</div>
    <a class="btn" href="https://www.youtube.com/@TheJourney_JnR" target="_blank" rel="noopener">
      <span class="tile" style="background:#FF0000"><img src="icons/youtube.svg" alt="YouTube"></span>
      <span class="name">YouTube　看影片版訪談</span><span class="go">›</span>
    </a>
    <a class="btn" href="https://www.instagram.com/thejourney.1212/" target="_blank" rel="noopener">
      <span class="tile" style="background:linear-gradient(135deg,#FEDA75,#FA7E1E,#D62976,#962FBF,#4F5BD5)"><img src="icons/instagram.svg" alt="Instagram"></span>
      <span class="name">Instagram</span><span class="go">›</span>
    </a>
    <a class="btn soon">
      <span class="tile" style="background:#1877F2"><img src="icons/facebook.svg" alt="Facebook"></span>
      <span class="name">Facebook</span><span class="go">提供連結後啟用</span>
    </a>

    <div class="section">收聽 Podcast（選你愛用的平台）</div>
    <a class="btn" href="https://podcasts.apple.com/podcast/id1896864602" target="_blank" rel="noopener">
      <span class="tile" style="background:linear-gradient(135deg,#822CBE,#D24DB7)"><img src="icons/applepodcasts.svg" alt="Apple Podcasts"></span>
      <span class="name">Apple Podcasts</span><span class="go">›</span>
    </a>
    <a class="btn" href="https://open.spotify.com/show/2svpqwglrQARrTQ5k6fcH7" target="_blank" rel="noopener">
      <span class="tile" style="background:#1DB954"><img src="icons/spotify.svg" alt="Spotify"></span>
      <span class="name">Spotify</span><span class="go">›</span>
    </a>
    <a class="btn" href="https://podcast.kkbox.com/tw/channel/OoIRdBxuZRSyP2yUvB" target="_blank" rel="noopener">
      <span class="tile txt" style="background:#00AEEF">KK</span>
      <span class="name">KKBOX</span><span class="go">›</span>
    </a>
    <a class="btn" href="https://music.youtube.com/playlist?list=PLmfOOiSp8GwreJ1C7M2Lfgj569zukkrwK" target="_blank" rel="noopener">
      <span class="tile" style="background:#FF0000"><img src="icons/youtubemusic.svg" alt="YouTube Music"></span>
      <span class="name">YouTube Music</span><span class="go">›</span>
    </a>

    <div class="section">合作 & 來賓邀約</div>
    <a class="btn" id="emailBtn" href="mailto:johnnyandryan.podcast@gmail.com">
      <span class="tile" style="background:#5B6B7D">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="22" height="22" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 7.5l8.5 6 8.5-6"/></svg>
      </span>
      <span class="name">寫信給我們<span class="sub" id="emailSub">johnnyandryan.podcast@gmail.com</span></span><span class="go">›</span>
    </a>

    <div class="foot">© 2026 在路上 The Journey</div>
  </main>

  <!-- Vercel Web Analytics：追蹤頁面流量 -->
  <script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
  <script defer src="/_vercel/insights/script.js"></script>
  <!-- 追蹤「哪個平台按鈕被點」 -->
  <script>
    document.querySelectorAll('a.btn[href]').forEach(function(a){
      a.addEventListener('click', function(){
        var el=a.querySelector('.name');
        var name=el?el.textContent.trim().split('　')[0].split('johnny')[0].trim():a.href;
        if(window.va) window.va('event',{name:'platform_click',platform:name});
      });
    });
    // Email：點一下複製信箱（mailto 在 IG/Threads 內建瀏覽器常打不開，複製最穩）
    var eb=document.getElementById('emailBtn'), sub=document.getElementById('emailSub');
    if(eb){ eb.addEventListener('click', function(e){
      var mail='johnnyandryan.podcast@gmail.com';
      if(navigator.clipboard&&navigator.clipboard.writeText){
        e.preventDefault();
        navigator.clipboard.writeText(mail).then(function(){
          var o=sub.textContent; sub.textContent='✓ 已複製，貼到信箱即可寄信';
          setTimeout(function(){ sub.textContent=o; }, 2000);
        }).catch(function(){ window.location.href='mailto:'+mail; });
      }
    }); }
  </script>
</body>
</html>
