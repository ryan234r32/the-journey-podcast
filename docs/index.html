<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    min-height:100vh; color:#fff;
    font-family:"Noto Sans TC",-apple-system,"PingFang TC","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    /* 由上而下：遮罩(確保文字清楚) → 背景圖(有就用) → 破曉漸層 fallback */
    background:
      linear-gradient(180deg, rgba(8,15,30,.45) 0%, rgba(8,15,30,.72) 100%),
      url('assets/bg.jpg') center/cover no-repeat,
      linear-gradient(165deg,#101f38 0%,#27365d 42%,#6a567a 72%,#c79a72 100%);
    background-attachment:fixed;
  }
  .wrap{ max-width:480px; margin:0 auto; padding:52px 22px 60px; }
  .profile{ text-align:center; margin-bottom:28px; }
  .avatar{
    width:112px; height:112px; border-radius:50%; object-fit:cover;
    border:3px solid rgba(255,255,255,.85);
    box-shadow:0 8px 28px rgba(0,0,0,.35); margin-bottom:16px;
  }
  h1{ font-size:27px; font-weight:900; letter-spacing:1px; margin-bottom:5px;
      text-shadow:0 2px 12px rgba(0,0,0,.3); }
  .handle{ color:rgba(255,255,255,.78); font-size:14px; font-weight:500; margin-bottom:14px; }
  .bio{ font-size:15px; font-weight:400; color:rgba(255,255,255,.92);
        line-height:1.7; max-width:360px; margin:0 auto; text-shadow:0 1px 8px rgba(0,0,0,.25); }

  .section{ font-size:11.5px; letter-spacing:3px; color:rgba(255,255,255,.62);
    text-transform:uppercase; margin:28px 6px 13px; font-weight:700; }

  .btn{
    display:flex; align-items:center; gap:14px;
    background:rgba(255,255,255,.13);
    backdrop-filter:blur(14px) saturate(130%);
    -webkit-backdrop-filter:blur(14px) saturate(130%);
    border:1px solid rgba(255,255,255,.18);
    border-radius:17px; padding:10px 16px 10px 10px; margin-bottom:13px;
    text-decoration:none; color:#fff; font-weight:700; font-size:16px;
    transition:transform .16s, background .16s;
  }
  .btn:hover{ transform:translateY(-2px); background:rgba(255,255,255,.22); }
  .tile{
    width:46px; height:46px; border-radius:13px; flex:0 0 46px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 10px rgba(0,0,0,.22);
  }
  .tile img{ width:24px; height:24px; display:block; }
  .tile.txt{ color:#fff; font-weight:900; font-size:18px; letter-spacing:-1px; font-family:Arial,sans-serif; }
  .name{ flex:1; }
  .go{ color:rgba(255,255,255,.55); font-size:20px; }
  .btn.soon{ opacity:.45; pointer-events:none; }
  .btn.soon .go{ font-size:12px; font-weight:500; }

  .foot{ text-align:center; margin-top:34px; font-size:13px; color:rgba(255,255,255,.6); }
  .foot a{ color:rgba(255,255,255,.78); border-bottom:1px dashed rgba(255,255,255,.4); text-decoration:none; }
  .foot p{ margin-top:10px; }
</style>
