<style>
  :root{ --ink:#1a1a2e; --muted:#6b7280; --line:#e5e7eb; --bg:#ffffff; }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.6;
  }
  .wrap{ max-width:520px; margin:0 auto; padding:48px 22px 64px; text-align:center; }
  .cover{
    width:180px; height:180px; border-radius:22px; object-fit:cover;
    box-shadow:0 10px 30px rgba(26,26,46,.14); margin:0 auto 22px;
  }
  h1{ font-size:30px; margin:0 0 6px; letter-spacing:.5px; }
  .by{ color:var(--muted); font-size:15px; margin:0 0 18px; }
  .tagline{ color:#374151; font-size:15px; margin:0 auto 30px; max-width:430px; }
  .listen-label{
    font-size:12px; letter-spacing:2px; color:var(--muted);
    text-transform:uppercase; margin:0 0 14px;
  }
  .btn{
    display:flex; align-items:center; gap:14px;
    width:100%; padding:15px 18px; margin:0 0 12px;
    border:1px solid var(--line); border-radius:14px;
    text-decoration:none; color:var(--ink); background:#fff;
    font-size:16px; font-weight:600; transition:.15s; text-align:left;
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(26,26,46,.10); border-color:#cbd5e1; }
  .btn .ic{ width:26px; text-align:center; font-size:20px; flex:0 0 26px; }
  .btn .name{ flex:1; }
  .btn .go{ color:var(--muted); font-size:14px; font-weight:500; }
  .btn.soon{ opacity:.55; cursor:default; pointer-events:none; }
  .btn.soon .go{ color:#9ca3af; }
  .foot{ margin-top:30px; font-size:13px; color:var(--muted); }
  .foot a{ color:var(--muted); }
  .rss{ display:inline-block; margin-top:8px; font-size:13px; color:var(--muted); text-decoration:none; border-bottom:1px dashed #cbd5e1; }
</style>
