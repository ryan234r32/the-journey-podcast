      12:10 那年代，得愛滋等於死刑
      16:51 怕的不是病毒，是人心
      23:09 替病人，跟歧視打了十年
      29:00 一句早安，敲開病人的心
      34:35 安寧病房到底在做什麼
      39:15 替末期病人圓最後的夢
